<!DOCTYPE html>
<html>
    <head>
        <title>kpop shuffler</title>
        <meta content="text/html;charset=utf-8" http-equiv="Content-Type">
        <link rel="shortcut icon" type="image/gif", href="chaeyoung-crop-circle.gif" />
        <link rel="stylesheet" href="styles.css" />
    </head>
    <body>
        <h2>kpop shuffler v 1.0</h2>
        <div id="video-panel">
            <input type="checkbox" id="videoCheck"> Don't show video (faster)
            <p id="loading">Loading...</p>
            <iframe id="vid" src="about:blank" width="778" height="438" frameborder="0" allowfullscreen></iframe>
        </div>
        <div id="controls-panel">
            <button type="button" id="butArt">anything!</button>
            <button type="button" id="butPop">popular</button>
            <button type="button" id="butFavs">erica's favourite videos 😎</button>
            <hr>
            <button type="button" id="butFem">female</button>
            <button type="button" id="butMal">male</button>
            <hr>
            <button type="button" id="butNuguAll">nugu (all)</button>
            <button type="button" id="butNuguFem">nugu (female)</button>
            <button type="button" id="butNuguMal">nugu (male)</button>
            <hr>
            <label for="input">you choose:</label>
            <input type="text" id="input" name="input" placeholder="enter artist name">
            <button type="button" id="butInput">submit</button>
            <label for="search">personalized results:</label>
            <input id="search" type="search" list="usernames" placeholder="enter last.fm username">
            <datalist id="usernames">
                <option value="chewtle"></option>
                <option value="chewtle-gg"></option>
                <option value="franey_22"></option>
                <option value="pporappippam"></option>
            </datalist>
            <button type="button" id="butSearch">submit</button>
        </div>
        <div id="result-panel">
            <p id="txt"></p>
        </div>
        <script type="text/javascript" src="index.js"></script>
    </body>
</html>
