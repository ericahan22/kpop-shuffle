<!DOCTYPE html>
<html>
    <head>
        <title>kpop shuffler</title>
        <meta content="text/html;charset=utf-8" http-equiv="Content-Type">
        <link rel="shortcut icon" type="image/gif", href="chaeyoung-crop-circle.gif" />
    </head>
    <body>
        <h2 style="margin-bottom:8px;">kpop shuffler v 1.0</h2>
        <div id="video-panel" style="float:left; margin:10px 10px 10px 0;">
            <input type="checkbox" id="videoCheck"> Don't show video (faster)
            <p id="loading" style="visibility:hidden; margin:15px 0 0 0;">Loading...</p>
            <iframe id="vid" src="about:blank" width="778" height="438" frameborder="0" allowfullscreen></iframe>
        </div>
        <div id="controls-panel" style="float:left; height:430px; width:400px; margin:10px; margin-top:50px;">
            <div style="height:25px"></div>
            <button type="button" id="butArt" style="font-size:90%;">anything!</button>
            <div style="height:10px"></div>
            <button type="button" id="butPop" style="font-size:90%;">popular</button>
            <div style="height:10px"></div>
            <button type="button" id="butFavs" style="font-size:90%;">erica's favourite videos 😎</button>
            <div style="height:10px"></div>
            <hr>
            <div style="height:10px"></div>
            <button type="button" id="butFem" style="font-size:90%;">female</button>
            <div style="height:10px"></div>
            <button type="button" id="butMal" style="font-size:90%;">male</button>
            <div style="height:10px"></div>
            <hr>
            <div style="height:10px"></div>
            <button type="button" id="butNuguAll" style="font-size:90%;">nugu (all)</button>
            <div style="height:10px"></div>
            <button type="button" id="butNuguFem" style="font-size:90%;">nugu (female)</button>
            <div style="height:10px"></div>
            <button type="button" id="butNuguMal" style="font-size:90%;">nugu (male)</button>
            <div style="height:10px"></div>
            <hr>
            <div style="height:10px"></div>
            <label for="input">you choose:</label>
            <input type="text" id="input" name="input" placeholder="enter artist name" style="width:145px;">
            <button type="button" id="butInput" style="font-size:90%;">submit</button>
            <div style="height:10px"></div>
            <label for="search">personalized results:</label>
            <input id="search" type="search" list="usernames" placeholder="enter last.fm username" style="width:160px;">
            <button type="button" id="butSearch" style="font-size:90%;">submit</button>
            <datalist id="usernames">
                <option value="chewtle"></option>
                <option value="chewtle-gg"></option>
                <option value="franey_22"></option>
                <option value="pporappippam"></option>
            </datalist>
        </div>
        <div id="result-panel" style="clear:both;">
            <p id="txt" style="font-size:160%;"></p>
        </div>
        <script type="text/javascript" src="index.js"></script>
    </body>
</html>
