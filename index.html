<!DOCTYPE html>
<html>
    <head>
        <title>kpop shuffler</title>
        <meta content="text/html;charset=utf-8" http-equiv="Content-Type">
    </head>
    <body>
        <h2>kpop shuffler v 1.0</h1>
        <div style="float:left">
            <iframe id="vid" src="" width="778" height="438" frameborder="0" allowfullscreen></iframe>
        </div>
        <div style="float:left; height:430px; width:500px; margin:10px">
            <button type="button" id="butArt" style="font-size:100%">anything!</button>
            <div style="height:10px"></div>
            <button type="button" id="butFem" style="font-size:100%">female artists</button>
            <div style="height:10px"></div>
            <button type="button" id="butMal" style="font-size:100%">male artists</button>
            <div style="height:10px"></div>
            <button type="button" id="butPop" style="font-size:100%">popular artists</button>
            <div style="height:30px"></div>
            <label for="input">get a random song from an artist:</label>
            <input type="text" id="input" name="input">
            <button type="button" id="butInput" style="font-size:100%">submit</button>
            <div style="height:10px"></div>
            <label for="inpName">personalized results:</label>
            <input type="text" id="inpName" name="inpName" placeholder="enter last.fm username">
            <button type="button" id="butInpName" style="font-size:100%">submit</button>
        </div>
        <div style="clear:both; margin:10px">
            <p id="txt" style="font-size:160%;"></p>
        </div>
        <script type="text/javascript" src="https://chewtle.github.io/kpop-shuffle/index.js"></script>
    </body>
</html>
